client_id = "YOUR_DEV_CLIENT_ID"
name = "Customer Insight Analytics Dev"
handle = "customer-insight-analytics-dev"
application_url = "https://your-tunnel.example.com"
embedded = true

[access_scopes]
scopes = "read_products,read_orders,read_content"

[auth]
redirect_urls = [
  "https://your-tunnel.example.com/auth/callback",
  "https://your-tunnel.example.com/auth/shopify/callback",
  "https://your-tunnel.example.com/api/auth/callback"
]

[webhooks]
api_version = "2026-01"

[[webhooks.subscriptions]]
topics = ["app/uninstalled"]
uri = "/webhooks/app/uninstalled"

[[webhooks.subscriptions]]
topics = ["app/scopes_update"]
uri = "/webhooks/app/scopes_update"

[[webhooks.subscriptions]]
topics = ["customers/data_request"]
uri = "/webhooks/customers/data_request"

[[webhooks.subscriptions]]
topics = ["customers/redact"]
uri = "/webhooks/customers/redact"

[[webhooks.subscriptions]]
topics = ["shop/redact"]
uri = "/webhooks/shop/redact"

[[webhooks.subscriptions]]
topics = ["products/create"]
uri = "/webhooks/products/create"

[[webhooks.subscriptions]]
topics = ["products/update"]
uri = "/webhooks/products/update"

[[webhooks.subscriptions]]
topics = ["orders/create"]
uri = "/webhooks/orders/create"
