name = "Customer Insight Analytics"
handle = "customer-insight-analytics"
application_url = "https://customer-insight-analytics-ww7zt533aa-as.a.run.app"
embedded = true

[access_scopes]
scopes = "read_products,write_products,read_content,write_content"

[auth]
redirect_urls = [
  "https://customer-insight-analytics-ww7zt533aa-as.a.run.app/auth/callback"
]

[webhooks]
api_version = "2026-01"

[[webhooks.subscriptions]]
topics = ["app/uninstalled"]
uri = "/webhooks/app/uninstalled"

[[webhooks.subscriptions]]
topics = ["app/scopes_update"]
